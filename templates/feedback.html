{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <h1 class="text-center mb-4">Submit Your Feedback</h1>
    <form method="POST">
        <div class="mb-3">
            <label for="feedback_message" class="form-label">Feedback Message:</label>
            <textarea name="feedback_message" id="feedback_message" class="form-control" rows="4" required></textarea>
        </div>

        <div class="mb-3">
            <label for="rating" class="form-label">Rating:</label>
            <select name="rating" id="rating" class="form-control" required>
                <option value="">Select a rating</option>
                <option value="1">1 Star</option>
                <option value="2">2 Stars</option>
                <option value="3">3 Stars</option>
                <option value="4">4 Stars</option>
                <option value="5">5 Stars</option>
            </select>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary">Submit Feedback</button>
        </div>
    </form>
</div>

{% endblock %}
